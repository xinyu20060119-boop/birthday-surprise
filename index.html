<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生日驚喜</title>
  <style>
    body {
      margin: 0;
      font-family: "Arial", sans-serif;
      background: linear-gradient(135deg, #fff1f5, #fff8e7);
      color: #5b3a3a;
      text-align: center;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      width: 88%;
      max-width: 430px;
      padding: 35px 25px;
      border-radius: 28px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    p {
      line-height: 1.8;
      font-size: 16px;
    }

    input {
      width: 80%;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid #e8b8c2;
      font-size: 18px;
      text-align: center;
      margin-top: 15px;
    }

    button {
      margin-top: 20px;
      padding: 13px 35px;
      border: none;
      border-radius: 999px;
      background: #f6a6b8;
      color: white;
      font-size: 17px;
      cursor: pointer;
    }

    button:hover {
      background: #ef8fa6;
    }

    .hidden {
      display: none;
    }

    .error {
      color: #d65c70;
      margin-top: 12px;
    }

    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      border: none;
      margin-top: 20px;
    }

    .message {
      background: #fff5f7;
      padding: 18px;
      border-radius: 20px;
      margin-top: 22px;
      font-size: 16px;
    }

    .heart {
      font-size: 34px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }
  </style>
</head>
<body>

  <div class="card" id="lockScreen">
    <div class="heart">🎁</div>
    <h1>生日驚喜</h1>
    <p>這份禮物只有你可以打開 ❤️<br>請輸入密碼解鎖</p>

    <input type="password" id="passwordInput" placeholder="輸入密碼">
    <br>
    <button onclick="checkPassword()">解鎖</button>

    <div class="error" id="errorText"></div>
  </div>

  <div class="card hidden" id="surpriseScreen">
    <div class="heart">🎉</div>
    <h1>Happy Birthday ❤️</h1>
    <p>親愛的寶貝，這是我準備給你的一小段影片。</p>

    <iframe 
      src="https://www.youtube.com/embed/OeaFybyIlbo?autoplay=1&rel=0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>

    <div class="message">
      親愛的寶貝這是我準備給你的一小段影片，希望你有喜歡！<br><br>
      之後沒有動力的時候都要記得打開來看看呦，愛你！
    </div>
  </div>

  <script>
    function checkPassword() {
      const password = document.getElementById("passwordInput").value;
      const correctPassword = "5200711";

      if (password === correctPassword) {
        document.getElementById("lockScreen").classList.add("hidden");
        document.getElementById("surpriseScreen").classList.remove("hidden");
      } else {
        document.getElementById("errorText").innerText = "密碼錯誤，再想想看喔 ❤️";
      }
    }
  </script>

</body>
</html>
